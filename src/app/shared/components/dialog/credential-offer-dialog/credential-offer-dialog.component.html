<h2 mat-dialog-title>{{ "credentialIssuance.credential-offer-dialog.title" | translate }}</h2>
<div mat-dialog-content class="offer-content">
  <p>{{ "credentialIssuance.credential-offer-dialog.message" | translate }}</p>

  <qrcode
    class="qrcode"
    [qrdata]="data.credentialOfferUri"
    [width]="220"
    [colorDark]="qrColor"
    [errorCorrectionLevel]="'M'">
  </qrcode>

  <div class="qr-actions">
    <button class="copy-button" [class.copied]="copied" (click)="copyOfferUri()">
      <mat-icon>{{ copied ? 'check' : 'content_copy' }}</mat-icon>
      <span>{{ (copied ? 'credentialIssuance.credential-offer-dialog.copied' : 'credentialIssuance.credential-offer-dialog.copy') | translate }}</span>
    </button>
  </div>
</div>

<div mat-dialog-actions>
  <button mat-flat-button color="primary" (click)="close()">
    {{ "dialog.close" | translate }}
  </button>
</div>
