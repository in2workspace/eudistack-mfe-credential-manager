# GitHub Actions workflow for deploying EUDIStack Credential Manager to AWS Amplify
# Manually triggered
name: Deploy to AWS Amplify
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to AWS Amplify
    runs-on: ubuntu-latest
    environment: stg
    env:
      AMPLIFY_APP_NAME: credential-manager
      BRANCH_NAME: main
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Npm Build
        run: npm run build -- --output-path=./dist/out --configuration "production"

      - name: Generate env.js from env.template.js (envsubst)
        env:
          IAM_URL: ${{ vars.IAM_URL }}
          IAM_URI_TEMPLATE: ${{ vars.IAM_URI_TEMPLATE }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          CLIENT_ID_PREFIX: ${{ vars.CLIENT_ID_PREFIX }}
          SERVER_URL: ${{ vars.SERVER_URL }}
          ADMIN_ORGANIZATION_ID: ${{ vars.ADMIN_ORGANIZATION_ID }}
          WALLET_URL: ${{ vars.WALLET_URL }}
          WALLET_URL_TEST: ${{ vars.WALLET_URL_TEST }}
          SHOW_WALLET_URL_TEST: ${{ vars.SHOW_WALLET_URL_TEST }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          if [ -f dist/out/assets/env.template.js ]; then
            envsubst < dist/out/assets/env.template.js > dist/out/assets/env.js
            echo "Generated env.js from env.template.js:"
            head -n 30 dist/out/assets/env.js || true
          else
            echo "dist/out/assets/env.template.js not found" >&2
            exit 1
          fi

      - name: Create Zip File
        run: |
          cd dist/out
          zip -r ../out.zip .
          echo "ZIP_FILE=dist/out.zip" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Extract Amplify App ID
        run: |
          AMPLIFY_APP_ID=$(aws amplify list-apps --query "apps[?name=='${{ env.AMPLIFY_APP_NAME }}'] | [0].appId" --output text)
          echo "AMPLIFY_APP_ID=$AMPLIFY_APP_ID" >> $GITHUB_ENV
          echo "Found App ID: $AMPLIFY_APP_ID for app: ${{ env.AMPLIFY_APP_NAME }}"

      - name: Create AWS Amplify Deployment
        run: |
          DEPLOYMENT_OUTPUT=$(aws amplify create-deployment --app-id ${{ env.AMPLIFY_APP_ID }} --branch-name ${{ env.BRANCH_NAME }} --output json)
          ZIP_UPLOAD_URL=$(echo $DEPLOYMENT_OUTPUT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT_OUTPUT | jq -r '.jobId')
          echo "ZIP_UPLOAD_URL=$ZIP_UPLOAD_URL" >> $GITHUB_ENV
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
          echo "Deployment created with Job ID: $JOB_ID and Upload URL: $ZIP_UPLOAD_URL"

      - name: Upload Deployment Zip
        run: |
          echo "Uploading zip file to AWS Amplify..."
          curl -X PUT --upload-file ${{ env.ZIP_FILE }} "${{ env.ZIP_UPLOAD_URL }}"

      - name: Start AWS Amplify Deployment
        run: |
          echo "Starting deployment for Job ID: ${{ env.JOB_ID }}"
          aws amplify start-deployment --app-id ${{ env.AMPLIFY_APP_ID }} --branch-name ${{ env.BRANCH_NAME }} --job-id ${{ env.JOB_ID }}
